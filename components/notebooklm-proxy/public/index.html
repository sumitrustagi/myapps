<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0d0f12; --surface:#13161b; --border:#1e2229;
      --accent:#d4f54e; --accent-dim:#8aa832; --muted:#4a5060;
      --text:#e8eaf0; --text-dim:#7b8494; --answer-bg:#151a12;
      --radius:10px; --font-ui:'Syne',sans-serif; --font-mono:'DM Mono',monospace;
    }
    html,body{ height:100%; background:var(--bg); color:var(--text); font-family:var(--font-ui); -webkit-font-smoothing:antialiased; }
    .shell{ display:grid; grid-template-rows:auto 1fr auto; height:100dvh; max-width:860px; margin:0 auto; padding:0 20px; }
    header{ padding:28px 0 20px; display:flex; align-items:center; gap:14px; border-bottom:1px solid var(--border); }
    .logo{ width:36px; height:36px; background:var(--accent); border-radius:8px; display:grid; place-items:center; flex-shrink:0; }
    .logo svg{ width:20px; height:20px; }
    .brand h1{ font-size:1.05rem; font-weight:700; letter-spacing:.02em; }
    .brand p{ font-size:.72rem; color:var(--text-dim); font-family:var(--font-mono); margin-top:2px; }
    .status-dot{ margin-left:auto; display:flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:.7rem; color:var(--text-dim); }
    .status-dot span{ width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background .4s; }
    .status-dot.online span{ background:var(--accent); box-shadow:0 0 6px var(--accent); }
    .status-dot.error span{ background:#f76b6b; }
    #chat{ overflow-y:auto; padding:28px 0; display:flex; flex-direction:column; gap:24px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    .empty-state{ margin:auto; text-align:center; color:var(--muted); user-select:none; }
    .empty-state .big{ font-size:2.5rem; line-height:1; }
    .empty-state p{ font-size:.8rem; font-family:var(--font-mono); margin-top:10px; }
    .msg{ display:flex; flex-direction:column; gap:4px; animation:fadeUp .25s ease both; }
    @keyframes fadeUp{ from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .msg-label{ font-size:.65rem; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.1em; color:var(--muted); padding:0 4px; }
    .msg-bubble{ padding:14px 18px; border-radius:var(--radius); font-size:.92rem; line-height:1.65; max-width:100%; word-break:break-word; }
    .msg.user{ align-items:flex-end; }
    .msg.user .msg-bubble{ background:var(--surface); border:1px solid var(--border); max-width:75%; }
    .msg.bot .msg-bubble{ background:var(--answer-bg); border:1px solid #2a3520; white-space:pre-wrap; }
    .thinking .msg-bubble{ display:flex; gap:5px; align-items:center; padding:14px 18px; }
    .dot-pulse{ width:7px; height:7px; border-radius:50%; background:var(--accent-dim); animation:pulse 1.2s ease-in-out infinite; }
    .dot-pulse:nth-child(2){ animation-delay:.2s; }
    .dot-pulse:nth-child(3){ animation-delay:.4s; }
    @keyframes pulse{ 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    .sources-tag{ display:inline-block; margin-top:10px; font-family:var(--font-mono); font-size:.68rem; color:var(--accent-dim); background:rgba(212,245,78,.06); border:1px solid rgba(212,245,78,.15); border-radius:4px; padding:3px 8px; }
    .input-bar{ padding:18px 0 24px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:flex-end; }
    textarea#q{ flex:1; resize:none; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:var(--font-ui); font-size:.9rem; padding:12px 16px; line-height:1.5; max-height:140px; transition:border-color .2s; outline:none; }
    textarea#q::placeholder{ color:var(--muted); }
    textarea#q:focus{ border-color:var(--accent-dim); }
    button#send{ flex-shrink:0; width:44px; height:44px; background:var(--accent); border:none; border-radius:var(--radius); cursor:pointer; display:grid; place-items:center; transition:background .15s,transform .1s; }
    button#send:hover{ background:#c8ef3e; }
    button#send:active{ transform:scale(.94); }
    button#send:disabled{ background:var(--muted); cursor:not-allowed; }
    button#send svg{ width:18px; height:18px; color:#0d0f12; }
    #chat::-webkit-scrollbar{ width:4px; }
    #chat::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      <svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h10M3 15h7" stroke="#0d0f12" stroke-width="2.2" stroke-linecap="round"/></svg>
    </div>
    <div class="brand">
      <h1 id="app-title">Team Knowledge Base</h1>
      <p>powered by your company docs</p>
    </div>
    <div class="status-dot" id="statusDot">
      <span></span><span id="statusLabel">connecting…</span>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="emptyState">
      <div class="big">📚</div>
      <p>Ask anything about your company documents.</p>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="q" rows="1" placeholder="Ask a question about your docs…" maxlength="2000"></textarea>
    <button id="send" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_BASE = window.API_BASE || '';
  const chatEl = document.getElementById('chat');
  const textarea = document.getElementById('q');
  const sendBtn = document.getElementById('send');
  const statusDot = document.getElementById('statusDot');
  const statusLbl = document.getElementById('statusLabel');
  const emptyState = document.getElementById('emptyState');
  let isWaiting = false;

  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
  });

  async function checkHealth() {
    try {
      const r = await fetch(`${API_BASE}/health`);
      const d = await r.json();
      if (d.status === 'ready') {
        statusDot.className = 'status-dot online';
        statusLbl.textContent = 'online';
      } else {
        statusDot.className = 'status-dot';
        statusLbl.textContent = 'initialising…';
        setTimeout(checkHealth, 3000);
      }
    } catch {
      statusDot.className = 'status-dot error';
      statusLbl.textContent = 'offline';
      setTimeout(checkHealth, 5000);
    }
  }
  checkHealth();

  function appendMessage(role, text, isThinking = false) {
    emptyState.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Knowledge Base';
    const bubble = document.createElement('div');
    bubble.className = isThinking ? 'msg-bubble thinking' : 'msg-bubble';
    if (isThinking) {
      bubble.innerHTML = '<div class="dot-pulse"></div><div class="dot-pulse"></div><div class="dot-pulse"></div>';
    } else {
      bubble.textContent = text;
    }
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  function setAnswer(wrap, text) {
    const bubble = wrap.querySelector('.msg-bubble');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    const tag = document.createElement('div');
    tag.className = 'sources-tag';
    tag.textContent = '📎 from your documents';
    bubble.appendChild(tag);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  async function send() {
    const q = textarea.value.trim();
    if (!q || isWaiting) return;
    isWaiting = true;
    sendBtn.disabled = true;
    textarea.value = '';
    textarea.style.height = 'auto';
    appendMessage('user', q);
    const thinkingWrap = appendMessage('bot', '', true);
    try {
      const res = await fetch(`${API_BASE}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });
      const data = await res.json();
      if (res.ok && data.answer) {
        setAnswer(thinkingWrap, data.answer);
      } else {
        setAnswer(thinkingWrap, `⚠️ Error: ${data.error || 'Unknown error'}`);
      }
    } catch {
      setAnswer(thinkingWrap, '❌ Could not reach the server. Is it running?');
    }
    isWaiting = false;
    sendBtn.disabled = false;
    textarea.focus();
  }

  sendBtn.addEventListener('click', send);
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
</script>
</body>
</html>
